name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint (type-check)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke test — `drift --version` runs
        run: node dist/index.js --version
